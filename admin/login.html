<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - POS Cafetería</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">☕</div>
      <div class="login-title">POS Cafetería</div>
      <div class="login-subtitle">Panel Administrador</div>

      <div id="loginError" class="login-error d-none"></div>

      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-input" id="emailInput" placeholder="admin@tucafeteria.com">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn btn-primary" id="loginBtn" onclick="login()">🔐 Ingresar al Panel</button>
      <div style="margin-top:16px">
        <a href="../index.html" style="color:var(--text-muted);font-size:0.82rem;text-decoration:none">← Volver al POS</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/config.js"></script>
  <script>
    // Verificar sesión activa
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });

    async function login() {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');
      errorEl.classList.add('d-none');

      if (!email || !password) {
        errorEl.textContent = 'Por favor ingresa correo y contraseña';
        errorEl.classList.remove('d-none');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Ingresando...';

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        errorEl.textContent = 'Correo o contraseña incorrectos';
        errorEl.classList.remove('d-none');
        btn.disabled = false;
        btn.textContent = '🔐 Ingresar al Panel';
        return;
      }

      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
